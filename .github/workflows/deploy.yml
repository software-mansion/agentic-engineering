name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v6.0.0
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
      - uses: oven-sh/setup-bun@v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      - uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4.0.5

  crawl:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for public deployment
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --location \
              https://agentic-engineering.swmansion.com/robots.txt | \
              grep --fixed-strings --quiet "Algolia-Crawler-Verif: FFA43F5A970188E4"; then
              exit 0
            fi
            sleep 10
          done

          echo "The new deployment was not visible after five minutes."
          exit 1
      - name: Start Algolia crawl
        env:
          ALGOLIA_CRAWLER_API_KEY: ${{ secrets.ALGOLIA_CRAWLER_API_KEY }}
          ALGOLIA_CRAWLER_USER_ID: ${{ secrets.ALGOLIA_CRAWLER_USER_ID }}
        run: |
          curl --fail-with-body --request POST \
            https://crawler.algolia.com/api/1/crawlers/4eef3d32-edb8-45c0-a060-4be7d26dc20b/reindex \
            --user "$ALGOLIA_CRAWLER_USER_ID:$ALGOLIA_CRAWLER_API_KEY"
